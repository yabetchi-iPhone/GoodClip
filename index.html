<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルTODOアプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-section input:focus {
            border-color: #667eea;
        }

        .input-section button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .input-section button:active {
            transform: scale(0.95);
        }

        .todo-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .todo-item:active {
            background: #f0f0f0;
        }

        .todo-item input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .todo-text {
            flex: 1;
            word-break: break-word;
            font-size: 16px;
            color: #333;
        }

        .todo-item button {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        .todo-item button:active {
            background: #ff5252;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #ccc;
            text-align: center;
            padding: 20px;
        }

        .empty-state p {
            font-size: 16px;
        }

        .footer {
            padding: 15px;
            text-align: center;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #f0f0f0;
            background: #fafafa;
        }

        /* スクロールバーのカスタマイズ（Safari対応） */
        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        @media (max-height: 600px) {
            .header {
                padding: 15px 20px 10px;
            }

            .header h1 {
                font-size: 24px;
                margin-bottom: 3px;
            }

            .input-section {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My TODO</h1>
            <p id="todoCount">タスク: 0件</p>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="新しいタスクを入力..."
                autocomplete="off"
            >
            <button id="addBtn">+</button>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">
                <p>📌 タスクを追加しましょう！</p>
            </div>
        </div>

        <div class="footer">
            <p>完了したタスクをチェックして管理しよう</p>
        </div>
    </div>

    <script>
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const todoList = document.getElementById('todoList');
        const todoCount = document.getElementById('todoCount');

        let todos = JSON.parse(localStorage.getItem('todos')) || [];

        // タスク追加
        function addTodo() {
            const text = todoInput.value.trim();
            if (text === '') return;

            const todo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.push(todo);
            todoInput.value = '';
            saveTodos();
            renderTodos();
            todoInput.focus();
        }

        // タスク削除
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
        }

        // タスク完了切り替え
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        // ローカルストレージに保存
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // タスク一覧を描画
        function renderTodos() {
            todoList.innerHTML = '';

            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <p>📌 タスクを追加しましょう！</p>
                    </div>
                `;
                todoCount.textContent = 'タスク: 0件';
                return;
            }

            todos.forEach(todo => {
                const todoItem = document.createElement('div');
                todoItem.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                todoItem.innerHTML = `
                    <input 
                        type="checkbox" 
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id})"
                    >
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <button onclick="deleteTodo(${todo.id})">🗑</button>
                `;
                todoList.appendChild(todoItem);
            });

            const completedCount = todos.filter(t => t.completed).length;
            todoCount.textContent = `タスク: ${todos.length}件 (完了: ${completedCount}件)`;
        }

        // HTMLエスケープ（XSS対策）
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // イベントリスナー
        addBtn.addEventListener('click', addTodo);
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        // 初期描画
        renderTodos();
        todoInput.focus();
    </script>
</body>
</html>
